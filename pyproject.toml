[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "llm-api-logger"
version = "0.1.0"
description = "Middleware HTTP logger for LLM API calls with JSONL and SQLite backends"
readme = "README.md"
license = {file = "LICENSE"}
authors = [{name = "Vaibhav Deshmukh", email = "vdeshmukh203@gmail.com"}]
requires-python = ">=3.8"
keywords = ["llm", "logging", "openai", "anthropic", "middleware", "cost", "reproducibility"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: System :: Logging",
]

[project.scripts]
llm-api-logger = "llm_api_logger:_cli"

[tool.setuptools]
py-modules = ["llm_api_logger"]
